[tools]
rust = ["stable", "nightly"]
"cargo:bpf-linker" = "latest"
"cargo:cargo-generate" = "latest"
protoc = "latest"

[env]
RUST_LOG = "info"

[tasks.add-bpf-targets]
description = "Add BPF compilation targets to the nightly toolchain"
run = [
  "rustup target add bpfel-unknown-none --toolchain nightly",
  "rustup target add bpfeb-unknown-none --toolchain nightly",
]

[tasks.toolchain]
description = "install nightly toolchain and rust-src component"
run = [
  "rustup toolchain install nightly --component rust-src",
  "rustup toolchain install stable --component rust-src",
]


[tasks.setup]
description = "Full project setup — install tools and add BPF targets"
depends = ["add-bpf-targets", "install-latest-bpftool", "mount-trace-debug-fs", "toolchain"]

[tasks.new]
description = "Scaffold a new aya project from the official template"
run = "cargo generate --git https://github.com/aya-rs/aya-template"

[tasks.build]
description = "Build the userspace application"
run = "cargo build"

[tasks.build-ebpf]
description = "Build the eBPF program (little-endian target)"
run = "cargo build -Z build-std=core --target bpfel-unknown-none --release"

[tasks.run]
description = "Run the application (requires root for BPF loading)"
run = "sudo -E cargo xtask run"

[tasks.test-userspace]
description = "Check userspace code compiles (no privileged eBPF integration test)"
dir = "hold-packet"
run = "cargo check"

[tasks.test-ebpf-only]
description = "Run only eBPF integration tests (requires root and Linux)"
dir = "hold-packet"
run = "sudo env PATH=$PATH RUSTUP_TOOLCHAIN=nightly cargo test --test integration_test -- --nocapture"

[tasks.test-e2e]
description = "Run only userspace black-box E2E replay test (requires root and Linux)"
dir = "hold-packet"
run = "sudo env PATH=$PATH RUSTUP_TOOLCHAIN=nightly cargo test --test integration_test test_userspace_replay_blackbox_e2e -- --nocapture"

[tasks.test]
description = "Run all tests (userspace + eBPF; eBPF tests require root)"
dir = "hold-packet"
run = "sudo env PATH=$PATH RUSTUP_TOOLCHAIN=nightly cargo test --test integration_test -- --nocapture"
