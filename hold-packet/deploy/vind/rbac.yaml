apiVersion: v1
kind: ServiceAccount
metadata:
  name: hold-operator
  namespace: hold-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hold-operator
rules:
  - apiGroups: ["scale.sleepy.com"]
    resources: ["scaletozero"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["scale.sleepy.com"]
    resources: ["scaletozero/status"]
    verbs: ["patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hold-operator
subjects:
  - kind: ServiceAccount
    name: hold-operator
    namespace: hold-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hold-operator
